<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#fce7f3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  
  <!-- 心形图标 -->
  <g filter="url(#glow)">
    <path d="M50 35 C50 35, 35 20, 25 30 C15 40, 20 55, 35 65 C45 72, 50 75, 50 75 C50 75, 55 72, 65 65 C80 55, 85 40, 75 30 C65 20, 50 35, 50 35Z" 
          fill="url(#heartGrad)" opacity="0.95"/>
  </g>
  
  <!-- 心跳线 -->
  <path d="M35 50 L42 50 L46 42 L52 58 L56 50 L65 50" 
        stroke="#ec4899" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
  
  <!-- 小圆点 -->
  <circle cx="50" cy="50" r="2.5" fill="#fff" opacity="0.8"/>
</svg>